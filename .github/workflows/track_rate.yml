name: JPY/INR Rate Tracker

on:
  schedule:
    # Runs every day at 08:00 UTC (1:30 PM IST)
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write  # to commit rates.csv
  issues: write    # to open alert issues

jobs:
  track-rate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run rate tracker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python check_rate.py

      - name: Commit updated rates.csv
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rates.csv
          git diff --cached --quiet || git commit -m "chore: update JPY/INR rate $(date -u +%Y-%m-%d)"
          git push
